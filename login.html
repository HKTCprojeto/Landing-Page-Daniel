<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Login · Executive Import Program</title>
<script>document.documentElement.setAttribute('data-theme',localStorage.getItem('eip-theme')||'light');</script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Fraunces:opsz,wght@9..144,400;9..144,600&display=swap" rel="stylesheet">
<style>
  /* ── Tokens ── */
  :root {
    --blue: #2b6fb5; --accent: #c8102e;
    --green: #15803d; --red: #dc2626;
    /* Light mode (default) */
    --body-bg: #e8eef7;
    --card-bg: #ffffff;
    --ink: #0e1620; --muted: #5b6b7d; --line: #e3e8ef;
    --input-bg: #ffffff;
    --logo-text: #0a1f3a;
    --logo-sub: rgba(10,31,58,.45);
  }
  [data-theme="dark"] {
    --body-bg: #08172a;
    --card-bg: #0f2a4a;
    --ink: #dde6f0; --muted: #7a97b6; --line: rgba(255,255,255,.1);
    --input-bg: #091829;
    --logo-text: #ffffff;
    --logo-sub: rgba(255,255,255,.45);
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Manrope', sans-serif;
    background: var(--body-bg);
    min-height: 100vh;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 32px 16px;
    transition: background .25s;
  }

  /* ── Theme toggle ── */
  .theme-btn {
    position: fixed; top: 16px; right: 16px; z-index: 99;
    width: 38px; height: 38px; border-radius: 50%;
    display: grid; place-items: center; font-size: 16px;
    cursor: pointer; border: 1.5px solid rgba(255,255,255,.2);
    background: rgba(255,255,255,.15); backdrop-filter: blur(6px);
    transition: background .2s, border-color .2s;
  }
  [data-theme="light"] .theme-btn {
    background: rgba(10,31,58,.08);
    border-color: rgba(10,31,58,.15);
  }
  .theme-btn:hover { opacity: .8; }

  /* ── Logo ── */
  .logo {
    display: flex; align-items: center; gap: 12px;
    text-decoration: none; margin-bottom: 28px;
  }
  .logo-badge {
    width: 42px; height: 42px; border-radius: 11px;
    background: linear-gradient(135deg,#2b6fb5,#15396b);
    display: grid; place-items: center;
    font-family: 'Fraunces', serif; font-size: 13px;
    font-weight: 700; color: #fff; letter-spacing: .05em;
  }
  .logo-name { color: var(--logo-text); }
  .logo-name strong { display: block; font-size: 14px; font-weight: 700; }
  .logo-name span { font-size: 11px; color: var(--logo-sub); letter-spacing: .08em; text-transform: uppercase; }

  /* ── Card ── */
  .card {
    background: var(--card-bg); border-radius: 20px;
    padding: 40px 36px; width: 100%; max-width: 420px;
    box-shadow: 0 24px 60px rgba(0,0,0,.25);
    transition: background .25s;
  }
  .card-title { font-family: 'Fraunces', serif; font-size: 26px; color: var(--ink); margin-bottom: 4px; }
  .card-sub   { font-size: 14px; color: var(--muted); margin-bottom: 28px; }

  /* ── Alerts ── */
  .alert { padding: 12px 16px; border-radius: 10px; font-size: 13px; margin-bottom: 20px; display: none; }
  .alert.err { background: #fef2f2; color: var(--red);   border: 1px solid #fecaca; display: block; }
  .alert.ok  { background: #f0fdf4; color: var(--green); border: 1px solid #bbf7d0; display: block; }
  [data-theme="dark"] .alert.err { background: rgba(220,38,38,.12); border-color: rgba(220,38,38,.3); }
  [data-theme="dark"] .alert.ok  { background: rgba(21,128,61,.12);  border-color: rgba(21,128,61,.3); }

  /* ── Fields ── */
  .row { margin-bottom: 16px; }
  label {
    display: block; font-size: 11px; font-weight: 700;
    letter-spacing: .07em; text-transform: uppercase;
    color: var(--muted); margin-bottom: 6px;
  }
  .inp-wrap { position: relative; }
  input {
    width: 100%; padding: 12px 14px;
    border: 1.5px solid var(--line); border-radius: 10px;
    font-family: 'Manrope', sans-serif; font-size: 15px;
    color: var(--ink); background: var(--input-bg);
    transition: border-color .15s, box-shadow .15s, background .25s, color .25s; outline: none;
  }
  input:focus { border-color: var(--blue); box-shadow: 0 0 0 3px rgba(43,111,181,.12); }
  input.ok    { border-color: var(--green); }
  input.err   { border-color: var(--red); }
  .eye {
    position: absolute; right: 12px; top: 50%; transform: translateY(-50%);
    background: none; border: none; cursor: pointer;
    color: var(--muted); font-size: 17px; padding: 4px; line-height: 1;
  }
  input.has-eye { padding-right: 42px; }

  .fmsg { font-size: 12px; margin-top: 5px; min-height: 16px; }
  .fmsg.err { color: var(--red); }

  /* ── Misc ── */
  .forgot { display: block; text-align: right; font-size: 12px; color: var(--blue); text-decoration: none; margin-top: -8px; margin-bottom: 16px; }
  .forgot:hover { text-decoration: underline; }

  .btn {
    width: 100%; padding: 14px; margin-top: 8px;
    background: var(--accent); color: #fff;
    font-family: 'Manrope', sans-serif; font-size: 15px; font-weight: 700;
    border: none; border-radius: 10px; cursor: pointer;
    transition: background .15s; letter-spacing: .02em;
  }
  .btn:hover:not(:disabled) { background: #a40d26; }
  .btn:disabled { opacity: .6; cursor: not-allowed; }
  .btn.success  { background: var(--green) !important; }

  .divider { display: flex; align-items: center; gap: 12px; margin: 20px 0; color: var(--muted); font-size: 12px; }
  .divider::before, .divider::after { content:''; flex:1; height:1px; background: var(--line); }

  .footer { text-align: center; margin-top: 20px; font-size: 13px; color: var(--muted); }
  .footer a { color: var(--blue); text-decoration: none; font-weight: 600; }
  .footer a:hover { text-decoration: underline; }
</style>
</head>
<body>

<button class="theme-btn" id="theme-btn" onclick="toggleTheme()" title="Alternar tema"></button>

<a href="Landing.html" class="logo">
  <div class="logo-badge">EIP</div>
  <div class="logo-name">
    <strong>Executive Import Program</strong>
    <span>by Daniel Cassetari · HKTC</span>
  </div>
</a>

<div class="card">
  <h1 class="card-title">Entrar</h1>
  <p class="card-sub">Acesse sua conta do programa.</p>

  <div id="alert" class="alert"></div>

  <form id="form" novalidate>

    <!-- Email -->
    <div class="row">
      <label for="email">E-mail</label>
      <input id="email" type="email" placeholder="voce@email.com" autocomplete="email" />
      <div class="fmsg" id="m-email"></div>
    </div>

    <!-- Senha -->
    <div class="row">
      <label for="senha">Senha</label>
      <div class="inp-wrap">
        <input id="senha" type="password" placeholder="Sua senha" class="has-eye" autocomplete="current-password" />
        <button type="button" class="eye" id="eye-btn">👁</button>
      </div>
      <div class="fmsg" id="m-senha"></div>
    </div>

    <a href="recuperar-senha.html" class="forgot">Esqueceu a senha?</a>

    <button type="submit" class="btn" id="btn">Entrar</button>
  </form>

  <div class="divider">ou</div>

  <div class="footer">Não tem conta? <a href="cadastro.html">Criar conta grátis</a></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const SUPA_URL = 'https://uuzuyiydkfugccgpjwnl.supabase.co';
const SUPA_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InV1enV5aXlka2Z1Z2NjZ3Bqd25sIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkzMTY4NjYsImV4cCI6MjA5NDg5Mjg2Nn0.SNFwLyRAdaDS3XJifpXezTjv9qLZatPBsHZVAgC1h9k';
const sb = window.supabase.createClient(SUPA_URL, SUPA_KEY);

function set(id, mid, ok, msg) {
  const el=document.getElementById(id), m=document.getElementById(mid);
  el.classList.toggle('ok',  ok===true);
  el.classList.toggle('err', ok===false);
  m.className='fmsg '+(ok===false?'err':'');
  m.textContent=msg||'';
}
function alert_(msg, type) {
  const el=document.getElementById('alert');
  el.textContent=msg; el.className='alert '+type;
}

document.getElementById('email').addEventListener('blur', () => {
  const v=document.getElementById('email').value.trim();
  const ok=/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(v);
  set('email','m-email',ok?null:false,ok?'':'E-mail inválido.');
});

document.getElementById('senha').addEventListener('blur', () => {
  const v=document.getElementById('senha').value;
  if(!v) set('senha','m-senha',false,'Informe sua senha.');
  else set('senha','m-senha',null,'');
});

document.getElementById('eye-btn').addEventListener('click', () => {
  const inp=document.getElementById('senha');
  inp.type=inp.type==='password'?'text':'password';
  document.getElementById('eye-btn').textContent=inp.type==='password'?'👁':'🔒';
});

/* ── Aviso conta desativada ── */
(function(){
  const p = new URLSearchParams(window.location.search);
  if (p.get('conta') === 'desativada') {
    const el = document.getElementById('alert');
    el.textContent = 'Sua conta foi desativada. Entre em contato com o suporte.';
    el.className = 'alert err';
  }
})();

/* ── Theme ── */
(function(){
  const t = localStorage.getItem('eip-theme') || 'light';
  document.documentElement.setAttribute('data-theme', t);
  updateThemeBtn(t);
})();
function updateThemeBtn(t) {
  const btn = document.getElementById('theme-btn');
  if(!btn) return;
  btn.textContent = t === 'dark' ? '☀️' : '🌙';
  btn.title = t === 'dark' ? 'Tema claro' : 'Tema escuro';
}
function toggleTheme() {
  const cur = document.documentElement.getAttribute('data-theme') || 'light';
  const next = cur === 'dark' ? 'light' : 'dark';
  document.documentElement.setAttribute('data-theme', next);
  localStorage.setItem('eip-theme', next);
  updateThemeBtn(next);
}

document.getElementById('form').addEventListener('submit', async e => {
  e.preventDefault();
  document.getElementById('alert').className='alert';

  const email = document.getElementById('email').value.trim();
  const senha = document.getElementById('senha').value;

  let ok=true;
  if(!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) { set('email','m-email',false,'E-mail inválido.'); ok=false; }
  if(!senha)                                       { set('senha','m-senha',false,'Informe sua senha.'); ok=false; }
  if(!ok) return;

  const btn=document.getElementById('btn');
  btn.disabled=true; btn.textContent='Entrando…';

  const { data, error } = await sb.auth.signInWithPassword({ email, password: senha });

  if(error) {
    btn.disabled=false; btn.textContent='Entrar';
    const map = {
      'Invalid login credentials': 'E-mail ou senha incorretos.',
      'Email not confirmed':        'Confirme seu e-mail antes de entrar. Verifique sua caixa de entrada.',
      'Too many requests':          'Muitas tentativas. Aguarde alguns minutos.',
    };
    return alert_(map[error.message]||'Erro ao entrar: '+error.message,'err');
  }

  btn.classList.add('success'); btn.textContent='✓ Bem-vindo!';
  alert_('Login realizado com sucesso! Redirecionando…','ok');
  setTimeout(() => window.location.href='dashboard.html', 1500);
});
</script>
</body>
</html>
