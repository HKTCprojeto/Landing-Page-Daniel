<!DOCTYPE html>
<html lang="pt-BR" data-theme="light">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Dashboard · Executive Import Program</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Fraunces:opsz,wght@9..144,400;9..144,600&display=swap" rel="stylesheet">
<style>
  /* ═══ TOKENS DE TEMA ═══ */
  :root {
    --navy:#0a1f3a; --navy-2:#0f2a4a; --navy-3:#15396b;
    --blue:#2b6fb5; --accent:#c8102e; --green:#15803d;
    --sidebar-w:260px;
    --bg:#f6f8fb; --bg2:#eef2f7; --card:#ffffff; --border:#e3e8ef;
    --text:#0e1620; --text2:#1c2733; --muted:#5b6b7d;
    --topbar-bg:#ffffff; --input-bg:#f6f8fb;
    --badge-lock-bg:#f1f5f9; --badge-lock-clr:#5b6b7d;
    --badge-open-bg:#eff6ff; --badge-open-clr:#2b6fb5;
    --btn-ap-hover-bg:#eff6ff;
  }
  [data-theme="dark"] {
    --bg:#08172a; --bg2:#0a1f3a; --card:#0f2a4a; --border:rgba(255,255,255,.09);
    --text:#dde6f0; --text2:#b8cfe8; --muted:#7a97b6;
    --topbar-bg:#091829; --input-bg:#0a1f3a;
    --badge-lock-bg:rgba(255,255,255,.06); --badge-lock-clr:#7a97b6;
    --badge-open-bg:rgba(43,111,181,.2); --badge-open-clr:#7eb8f5;
    --btn-ap-hover-bg:rgba(43,111,181,.15);
  }

  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Manrope',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;transition:background .25s,color .25s}

  /* ═══ SIDEBAR ═══ */
  .sidebar{width:var(--sidebar-w);background:var(--navy);min-height:100vh;display:flex;flex-direction:column;position:fixed;left:0;top:0;bottom:0;z-index:100;transition:transform .25s ease}
  .sidebar-brand{display:flex;align-items:center;gap:11px;padding:24px 20px 20px;border-bottom:1px solid rgba(255,255,255,.08);text-decoration:none}
  .brand-badge{width:38px;height:38px;border-radius:10px;background:linear-gradient(135deg,#2b6fb5,#15396b);display:grid;place-items:center;flex-shrink:0;font-family:'Fraunces',serif;font-size:12px;font-weight:700;color:#fff;letter-spacing:.04em}
  .brand-text strong{display:block;font-size:13px;font-weight:700;color:#fff;line-height:1.2}
  .brand-text span{font-size:10px;color:rgba(255,255,255,.4);letter-spacing:.07em;text-transform:uppercase}
  .user-chip{display:flex;align-items:center;gap:10px;padding:14px 20px;border-bottom:1px solid rgba(255,255,255,.07)}
  .avatar{width:34px;height:34px;border-radius:50%;background:linear-gradient(135deg,var(--blue),var(--navy-3));display:grid;place-items:center;flex-shrink:0;font-size:13px;font-weight:700;color:#fff}
  .user-info{overflow:hidden;flex:1}
  .user-name{font-size:13px;font-weight:600;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .user-email{font-size:11px;color:rgba(255,255,255,.4);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .role-pill{display:inline-block;padding:2px 7px;border-radius:99px;font-size:9px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;margin-top:3px}
  .role-pill.admin{background:rgba(200,16,46,.3);color:#fca5a5}
  .role-pill.user{background:rgba(43,111,181,.25);color:#93c5fd}
  .nav{flex:1;padding:16px 12px;overflow-y:auto}
  .nav-section{margin-bottom:24px}
  .nav-section-label{font-size:10px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:rgba(255,255,255,.3);padding:0 8px;margin-bottom:6px}
  .nav-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:10px;cursor:pointer;text-decoration:none;color:rgba(255,255,255,.65);font-size:14px;font-weight:500;transition:background .15s,color .15s;user-select:none}
  .nav-item:hover{background:rgba(255,255,255,.07);color:#fff}
  .nav-item.active{background:rgba(43,111,181,.35);color:#fff}
  .nav-item .icon{font-size:17px;width:22px;text-align:center;flex-shrink:0}
  .sidebar-footer{padding:12px;border-top:1px solid rgba(255,255,255,.07)}
  .btn-logout{width:100%;display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:10px;background:none;border:none;cursor:pointer;color:rgba(255,255,255,.45);font-family:'Manrope',sans-serif;font-size:14px;font-weight:500;transition:background .15s,color .15s}
  .btn-logout:hover{background:rgba(200,16,46,.2);color:#f87171}
  .btn-logout .icon{font-size:17px;width:22px;text-align:center}
  .menu-toggle{display:none;position:fixed;top:16px;left:16px;z-index:200;background:var(--navy);color:#fff;border:none;border-radius:8px;padding:8px 10px;font-size:20px;cursor:pointer;box-shadow:0 4px 12px rgba(0,0,0,.3)}
  .overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:99}

  /* ═══ MAIN ═══ */
  .main{margin-left:var(--sidebar-w);flex:1;display:flex;flex-direction:column;min-height:100vh}
  .topbar{background:var(--topbar-bg);border-bottom:1px solid var(--border);padding:0 32px;height:60px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50;transition:background .25s,border-color .25s}
  .page-title{font-size:17px;font-weight:700;color:var(--text)}
  .topbar-right{display:flex;align-items:center;gap:10px}
  .topbar-user{font-size:13px;color:var(--muted)}
  .admin-badge{padding:3px 10px;border-radius:99px;font-size:11px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;background:rgba(200,16,46,.12);color:#c8102e;border:1px solid rgba(200,16,46,.25)}
  [data-theme="dark"] .admin-badge{background:rgba(200,16,46,.2);color:#fca5a5;border-color:rgba(200,16,46,.35)}
  .theme-toggle{display:flex;align-items:center;gap:8px;background:var(--bg2);border:1px solid var(--border);border-radius:99px;padding:5px 12px;cursor:pointer;font-family:'Manrope',sans-serif;font-size:13px;font-weight:600;color:var(--text);transition:background .2s,border-color .2s,color .2s;user-select:none}
  .theme-toggle:hover{border-color:var(--blue);color:var(--blue)}
  .theme-toggle .t-icon{font-size:15px;line-height:1}
  .content{padding:32px;flex:1}
  .section{display:none}
  .section.active{display:block}

  /* ═══ HOME ═══ */
  .welcome-header{margin-bottom:28px}
  .welcome-header h1{font-family:'Fraunces',serif;font-size:28px;color:var(--text);margin-bottom:6px}
  .welcome-header p{font-size:15px;color:var(--muted)}
  .cards-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:16px}
  .dash-card{background:var(--card);border-radius:14px;border:1px solid var(--border);padding:22px;cursor:pointer;transition:box-shadow .15s,transform .15s,background .25s}
  .dash-card:hover{box-shadow:0 8px 24px rgba(0,0,0,.1);transform:translateY(-2px)}
  .dash-card .card-icon{font-size:28px;margin-bottom:12px}
  .dash-card .card-label{font-size:13px;font-weight:700;color:var(--text);margin-bottom:4px}
  .dash-card .card-desc{font-size:12px;color:var(--muted)}

  /* ═══ APOSTILAS ═══ */
  .section-header{margin-bottom:20px;display:flex;align-items:flex-start;justify-content:space-between;gap:12px;flex-wrap:wrap}
  .section-header-text h2{font-family:'Fraunces',serif;font-size:24px;color:var(--text);margin-bottom:4px}
  .section-header-text p{font-size:14px;color:var(--muted)}
  .btn-add-modulo{display:flex;align-items:center;gap:7px;padding:9px 16px;border-radius:8px;background:var(--blue);color:#fff;border:none;font-family:'Manrope',sans-serif;font-size:13px;font-weight:700;cursor:pointer;transition:background .15s;flex-shrink:0}
  .btn-add-modulo:hover{background:#1d5fa0}
  .apostilas-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:16px}
  .apostila-card{background:var(--card);border-radius:14px;border:1px solid var(--border);padding:20px;display:flex;flex-direction:column;gap:10px;transition:box-shadow .15s,transform .15s,background .25s}
  .apostila-card:hover{box-shadow:0 8px 24px rgba(0,0,0,.1);transform:translateY(-2px)}
  .apostila-cover{aspect-ratio:3/2;border-radius:8px;background:linear-gradient(135deg,var(--navy-2),var(--navy-3));display:flex;align-items:center;justify-content:center;font-size:36px}
  .apostila-title{font-size:15px;font-weight:700;color:var(--text)}
  .apostila-badge{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:600;padding:4px 10px;border-radius:99px;width:fit-content}
  .badge-locked{background:var(--badge-lock-bg);color:var(--badge-lock-clr)}
  .badge-open{background:var(--badge-open-bg);color:var(--badge-open-clr)}
  .btn-apostila{padding:10px 14px;border-radius:8px;font-family:'Manrope',sans-serif;font-size:13px;font-weight:600;border:1.5px solid var(--border);background:none;color:var(--text);cursor:pointer;text-align:center;transition:border-color .15s,background .15s,color .15s}
  .btn-apostila:hover:not(:disabled){border-color:var(--blue);background:var(--btn-ap-hover-bg);color:var(--blue)}
  .btn-apostila:disabled{opacity:.5;cursor:not-allowed}
  /* Admin actions */
  .admin-actions{display:flex;gap:6px;padding-top:8px;border-top:1px solid var(--border)}
  .btn-ap-adm{flex:1;padding:6px 4px;border-radius:6px;font-size:11px;font-weight:600;border:1px solid var(--border);background:none;color:var(--muted);cursor:pointer;font-family:'Manrope',sans-serif;transition:all .15s;display:flex;align-items:center;justify-content:center;gap:3px}
  .btn-ap-adm:hover{border-color:var(--blue);color:var(--blue);background:var(--btn-ap-hover-bg)}
  .btn-ap-adm.danger:hover{border-color:#dc2626;color:#dc2626;background:rgba(220,38,38,.08)}

  /* ═══ PERFIL ═══ */
  .perfil-card{background:var(--card);border-radius:14px;border:1px solid var(--border);padding:28px;max-width:520px;transition:background .25s}
  .perfil-avatar-wrap{position:relative;width:80px;height:80px;margin-bottom:14px;flex-shrink:0}
  .perfil-avatar{width:80px;height:80px;border-radius:50%;background:linear-gradient(135deg,var(--blue),var(--navy-3));display:grid;place-items:center;font-size:28px;font-weight:700;color:#fff;overflow:hidden;transition:opacity .2s}
  .perfil-avatar img{width:100%;height:100%;object-fit:cover;border-radius:50%}
  .perfil-avatar-overlay{position:absolute;inset:0;border-radius:50%;background:rgba(0,0,0,.5);display:flex;align-items:center;justify-content:center;font-size:22px;opacity:0;transition:opacity .2s;cursor:pointer}
  .perfil-avatar-wrap:hover .perfil-avatar-overlay{opacity:1}
  .avatar-actions{display:flex;align-items:center;gap:8px;margin-bottom:14px;flex-wrap:wrap}
  .btn-av{padding:6px 14px;border-radius:7px;font-family:'Manrope',sans-serif;font-size:12px;font-weight:600;cursor:pointer;transition:all .15s;border:1.5px solid var(--border);background:none;color:var(--muted);display:flex;align-items:center;gap:5px}
  .btn-av:hover{border-color:var(--blue);color:var(--blue)}
  .btn-av.danger{border-color:rgba(220,38,38,.4);color:#dc2626}
  .btn-av.danger:hover{background:rgba(220,38,38,.08)}
  .av-uploading{opacity:.5;pointer-events:none}
  .perfil-name{font-family:'Fraunces',serif;font-size:22px;color:var(--text);margin-bottom:4px}
  .perfil-email{font-size:14px;color:var(--muted);margin-bottom:24px}
  .perfil-fields{display:flex;flex-direction:column;gap:14px}
  .perfil-field label{font-size:11px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--muted);display:block;margin-bottom:5px}
  .perfil-field .value{padding:11px 14px;background:var(--input-bg);border:1px solid var(--border);border-radius:8px;font-size:15px;color:var(--text);transition:background .25s,border-color .25s}
  .perfil-input{width:100%;padding:11px 14px;background:var(--input-bg);border:1.5px solid var(--border);border-radius:8px;font-family:'Manrope',sans-serif;font-size:15px;color:var(--text);outline:none;transition:border-color .15s,box-shadow .15s,background .25s}
  .perfil-input:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(43,111,181,.12)}
  .perfil-input.ok{border-color:var(--green)}
  .perfil-input.err{border-color:#dc2626}
  .value.readonly{opacity:.65;cursor:default;user-select:none}
  .pfmsg{font-size:12px;margin-top:4px;min-height:15px}
  .pfmsg.ok{color:var(--green)}
  .pfmsg.err{color:#dc2626}
  .btn-salvar-perfil{padding:11px 24px;border-radius:8px;background:var(--blue);color:#fff;border:none;font-family:'Manrope',sans-serif;font-size:14px;font-weight:700;cursor:pointer;transition:background .15s}
  .btn-salvar-perfil:hover{background:#1d5fa0}
  .btn-salvar-perfil:disabled{opacity:.6;cursor:not-allowed}
  .perfil-status{font-size:13px;font-weight:600}
  .perfil-status.ok{color:var(--green)}
  .perfil-status.err{color:#dc2626}

  /* ═══ CONFIGURAÇÕES ═══ */
  .config-tabs{display:flex;gap:4px;margin-bottom:24px;background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:4px;width:fit-content}
  .config-tab{padding:8px 18px;border-radius:7px;border:none;background:none;font-family:'Manrope',sans-serif;font-size:13px;font-weight:600;color:var(--muted);cursor:pointer;transition:background .15s,color .15s}
  .config-tab.active{background:var(--card);color:var(--text);box-shadow:0 1px 4px rgba(0,0,0,.1)}
  .config-tab:hover:not(.active){color:var(--text)}
  .config-pane{display:none}
  .config-pane.active{display:block}
  .config-section-title{font-family:'Fraunces',serif;font-size:18px;color:var(--text);margin-bottom:16px}
  .table-wrap{border-radius:12px;border:1px solid var(--border);overflow:hidden;overflow-x:auto}
  .users-table{width:100%;border-collapse:collapse;min-width:620px}
  .users-table th{text-align:left;font-size:11px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--muted);padding:10px 14px;background:var(--bg2);border-bottom:1px solid var(--border)}
  .users-table td{padding:12px 14px;border-bottom:1px solid var(--border);font-size:13px;color:var(--text);vertical-align:middle}
  .users-table tr:last-child td{border-bottom:none}
  .users-table tbody tr:hover td{background:var(--bg2)}
  .user-cell{display:flex;align-items:center;gap:10px}
  .av-sm{width:30px;height:30px;border-radius:50%;background:linear-gradient(135deg,var(--blue),#15396b);display:inline-flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#fff;flex-shrink:0}
  .sel-field{padding:5px 8px;border-radius:6px;border:1px solid var(--border);background:var(--input-bg);color:var(--text);font-family:'Manrope',sans-serif;font-size:12px;cursor:pointer;outline:none}
  .sel-field:focus{border-color:var(--blue)}
  .btn-reset{padding:5px 10px;border-radius:6px;font-size:12px;font-weight:600;border:1px solid var(--border);background:none;color:var(--muted);cursor:pointer;font-family:'Manrope',sans-serif;transition:all .15s;white-space:nowrap}
  .btn-reset:hover{border-color:var(--blue);color:var(--blue)}
  .btn-desativar{padding:5px 10px;border-radius:6px;font-size:12px;font-weight:600;border:1px solid var(--border);background:none;color:var(--muted);cursor:pointer;font-family:'Manrope',sans-serif;transition:all .15s;white-space:nowrap}
  .btn-desativar:hover{border-color:#dc2626;color:#dc2626}
  .btn-ativar{padding:5px 10px;border-radius:6px;font-size:12px;font-weight:600;border:1px solid rgba(21,128,61,.4);background:none;color:var(--green);cursor:pointer;font-family:'Manrope',sans-serif;transition:all .15s;white-space:nowrap}
  .btn-ativar:hover{background:rgba(21,128,61,.08)}
  .row-inativo td{opacity:.45}
  .row-inativo td:last-child{opacity:1}
  .status-ativo{display:inline-flex;align-items:center;gap:4px;font-size:11px;font-weight:700;padding:2px 8px;border-radius:99px;background:rgba(21,128,61,.12);color:#15803d}
  .status-ativo::before{content:'';width:5px;height:5px;border-radius:50%;background:#15803d}
  .status-inativo{display:inline-flex;align-items:center;gap:4px;font-size:11px;font-weight:700;padding:2px 8px;border-radius:99px;background:rgba(220,38,38,.1);color:#dc2626}
  .status-inativo::before{content:'';width:5px;height:5px;border-radius:50%;background:#dc2626}
  [data-theme="dark"] .status-ativo{background:rgba(74,222,128,.12);color:#4ade80}
  [data-theme="dark"] .status-ativo::before{background:#4ade80}
  .btn-cad-user{display:flex;align-items:center;gap:7px;padding:9px 16px;border-radius:8px;background:var(--blue);color:#fff;border:none;font-family:'Manrope',sans-serif;font-size:13px;font-weight:700;cursor:pointer;transition:background .15s}
  .btn-cad-user:hover{background:#1d5fa0}
  .plano-tag{display:inline-block;padding:2px 8px;border-radius:99px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.05em}
  .plano-basico{background:var(--badge-lock-bg);color:var(--badge-lock-clr)}
  .plano-premium{background:rgba(234,179,8,.15);color:#d97706}
  .plano-vitalicio{background:rgba(21,128,61,.15);color:#15803d}
  [data-theme="dark"] .plano-premium{color:#fbbf24}
  [data-theme="dark"] .plano-vitalicio{color:#4ade80}

  /* ═══ API CARDS ═══ */
  .api-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:16px}
  .api-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:22px;display:flex;flex-direction:column;gap:14px;transition:box-shadow .15s,background .25s}
  .api-card:hover{box-shadow:0 6px 20px rgba(0,0,0,.08)}
  .api-card-top{display:flex;align-items:flex-start;gap:14px}
  .api-logo{width:44px;height:44px;border-radius:10px;display:grid;place-items:center;font-size:20px;flex-shrink:0;font-weight:700}
  .api-logo.supabase{background:linear-gradient(135deg,#3ecf8e22,#3ecf8e44);color:#3ecf8e;border:1px solid #3ecf8e44}
  .api-logo.vercel{background:linear-gradient(135deg,#ffffff22,#ffffff11);color:var(--text);border:1px solid var(--border)}
  .api-logo.gfonts{background:linear-gradient(135deg,#4285f422,#4285f444);color:#4285f4;border:1px solid #4285f444}
  .api-logo.supabasejs{background:linear-gradient(135deg,#3ecf8e11,#3ecf8e33);color:#3ecf8e;border:1px solid #3ecf8e33}
  .api-info{flex:1;min-width:0}
  .api-name{font-size:15px;font-weight:700;color:var(--text);margin-bottom:2px}
  .api-type{font-size:11px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--muted)}
  .api-status{display:flex;align-items:center;gap:5px;font-size:11px;font-weight:700;padding:4px 10px;border-radius:99px;flex-shrink:0;align-self:flex-start}
  .api-status.ok{background:rgba(21,128,61,.12);color:#15803d}
  .api-status.ok::before{content:'';width:6px;height:6px;border-radius:50%;background:#15803d;display:inline-block}
  [data-theme="dark"] .api-status.ok{background:rgba(74,222,128,.12);color:#4ade80}
  [data-theme="dark"] .api-status.ok::before{background:#4ade80}
  .api-desc{font-size:13px;color:var(--muted);line-height:1.6}
  .api-endpoint{display:flex;align-items:center;gap:7px;padding:9px 12px;background:var(--bg2);border:1px solid var(--border);border-radius:8px;font-size:12px;font-family:monospace;color:var(--muted);overflow:hidden}
  .api-endpoint span{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .api-footer{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px}
  .api-tags{display:flex;gap:6px;flex-wrap:wrap}
  .api-tag{padding:3px 9px;border-radius:99px;font-size:10px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;background:var(--badge-open-bg);color:var(--badge-open-clr)}
  .api-link{font-size:12px;font-weight:600;color:var(--blue);text-decoration:none;display:flex;align-items:center;gap:4px;transition:opacity .15s;flex-shrink:0}
  .api-link:hover{opacity:.75}

  /* ═══ MODAL APOSTILA (admin) ═══ */
  .modal-overlay{display:none;position:fixed;inset:0;z-index:600;background:rgba(0,0,0,.6);backdrop-filter:blur(4px);align-items:center;justify-content:center;padding:20px}
  .modal-overlay.open{display:flex}
  .modal-box{background:var(--card);border-radius:16px;padding:28px;width:100%;max-width:460px;box-shadow:0 24px 60px rgba(0,0,0,.4)}
  .modal-title{font-family:'Fraunces',serif;font-size:20px;color:var(--text);margin-bottom:20px}
  .mrow{margin-bottom:14px}

/* ══════════════════════════════════════
   PERFIL — FOTO
══════════════════════════════════════ */
function _setAllAvatars(html) {
  ['pf-av','sidebar-av'].forEach(id => {
    const el = document.getElementById(id);
    if (el) el.innerHTML = html;
  });
}

async function uploadAvatar(event) {
  const file = event.target.files[0];
  if (!file) return;
  if (file.size > 3 * 1024 * 1024) { alert('Imagem muito grande. Máximo 3 MB.'); return; }

  const ext   = file.name.split('.').pop().toLowerCase();
  const valid = ['jpg','jpeg','png','webp'];
  if (!valid.includes(ext)) { alert('Use JPG, PNG ou WEBP.'); return; }

  /* Loading visual */
  const wrap = document.querySelector('.perfil-avatar-wrap');
  if (wrap) wrap.classList.add('av-uploading');

  const path = `${_currentUserId}/avatar.${ext}`;
  const { error: upErr } = await sb.storage.from('avatars').upload(path, file, { upsert: true });

  if (upErr) {
    alert('Erro ao enviar foto: ' + upErr.message);
    wrap?.classList.remove('av-uploading');
    event.target.value = '';
    return;
  }

  const { data: { publicUrl } } = sb.storage.from('avatars').getPublicUrl(path);
  await sb.from('perfis').update({ avatar_url: publicUrl }).eq('id', _currentUserId);
  _currentAvatarUrl = publicUrl;

  const urlTs = publicUrl + '?t=' + Date.now();
  _setAllAvatars(`<img src="${urlTs}" alt="Avatar" style="width:100%;height:100%;object-fit:cover;border-radius:50%">`);

  const btnRem = document.getElementById('btn-remover-foto');
  if (btnRem) btnRem.style.display = '';

  wrap?.classList.remove('av-uploading');
  event.target.value = '';
}

async function removerFoto() {
  if (!confirm('Remover foto de perfil?')) return;

  /* Tenta deletar do storage */
  if (_currentAvatarUrl) {
    const stored = _currentAvatarUrl.split('/avatars/')[1]?.split('?')[0];
    if (stored) await sb.storage.from('avatars').remove([stored]);
  }

  await sb.from('perfis').update({ avatar_url: null }).eq('id', _currentUserId);
  _currentAvatarUrl = null;

  const ini = initials(formatNome(document.getElementById('pf-nm')?.textContent || ''));
  _setAllAvatars(ini);

  const btnRem = document.getElementById('btn-remover-foto');
  if (btnRem) btnRem.style.display = 'none';
}

/* ══════════════════════════════════════
   PERFIL — EDIÇÃO
══════════════════════════════════════ */
function maskCPF_pf(v) {
  return v.replace(/\D/g,'').slice(0,11)
    .replace(/(\d{3})(\d)/,'$1.$2')
    .replace(/(\d{3})(\d)/,'$1.$2')
    .replace(/(\d{3})(\d{1,2})$/,'$1-$2');
}
function cpfValido(c) {
  c = c.replace(/\D/g,'');
  if (c.length!==11 || /^(\d)\1+$/.test(c)) return false;
  let s=0; for(let i=0;i<9;i++) s += +c[i]*(10-i);
  let r=(s*10)%11; if(r>=10)r=0; if(r!==+c[9]) return false;
  s=0; for(let i=0;i<10;i++) s += +c[i]*(11-i);
  r=(s*10)%11; if(r>=10)r=0; return r===+c[10];
}
function setPf(id, mid, ok, msg) {
  const el=document.getElementById(id), m=document.getElementById(mid);
  if(el){ el.classList.toggle('ok', ok===true); el.classList.toggle('err', ok===false); }
  if(m) { m.className='pfmsg '+(ok===true?'ok':ok===false?'err':''); m.textContent=msg||''; }
}
function validatePfNome() {
  const v=document.getElementById('pf-nome')?.value.trim()||'';
  if (!v)                          { setPf('pf-nome','pm-nome',false,'Nome obrigatório.'); return false; }
  if (v.split(/\s+/).length < 2)   { setPf('pf-nome','pm-nome',false,'Informe nome e sobrenome.'); return false; }
  if (!/^[\p{L}\s]+$/u.test(v))    { setPf('pf-nome','pm-nome',false,'Apenas letras e espaços.'); return false; }
  setPf('pf-nome','pm-nome',true,''); return true;
}
function validatePfEmail() {
  const v=document.getElementById('pf-email')?.value.trim()||'';
  if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(v)) { setPf('pf-email','pm-email',false,'E-mail inválido.'); return false; }
  setPf('pf-email','pm-email',true,''); return true;
}
function validatePfCpf() {
  const v=document.getElementById('pf-cpf')?.value||'';
  if (!v.replace(/\D/g,'')) { setPf('pf-cpf','pm-cpf',null,''); return true; } // CPF vazio é aceito
  if (!cpfValido(v))        { setPf('pf-cpf','pm-cpf',false,'CPF inválido. Verifique os dígitos.'); return false; }
  setPf('pf-cpf','pm-cpf',true,'CPF válido ✓'); return true;
}

async function salvarPerfil() {
  if (!validatePfNome() | !validatePfEmail() | !validatePfCpf()) return; // | para validar todos

  const btn    = document.getElementById('btn-salvar-perfil');
  const status = document.getElementById('perfil-status');
  btn.disabled = true; btn.textContent = 'Salvando…';
  status.className = 'perfil-status'; status.textContent = '';

  const novoNome  = document.getElementById('pf-nome').value.trim();
  const novoEmail = document.getElementById('pf-email').value.trim();
  const novoCpf   = document.getElementById('pf-cpf').value.replace(/\D/g,'') || null;

  const { data:{ user:curUser } } = await sb.auth.getUser();
  const emailChanged = novoEmail !== curUser.email;

  /* Salva nome e CPF na tabela perfis */
  const { error: perfilErr } = await sb.from('perfis')
    .update({ nome: novoNome, cpf: novoCpf })
    .eq('id', curUser.id);

  if (perfilErr) {
    btn.disabled=false; btn.textContent='Salvar alterações';
    status.className='perfil-status err'; status.textContent='Erro ao salvar: '+perfilErr.message;
    return;
  }

  /* Se o e-mail mudou, atualiza via Supabase Auth (envia confirmação) */
  if (emailChanged) {
    const { error: emailErr } = await sb.auth.updateUser({ email: novoEmail });
    if (emailErr) {
      btn.disabled=false; btn.textContent='Salvar alterações';
      status.className='perfil-status err'; status.textContent='Erro no e-mail: '+emailErr.message;
      return;
    }
  }

  /* Atualiza o display do card */
  const nf = formatNome(novoNome);
  const av = initials(nf);
  const pfNm = document.getElementById('pf-nm');
  const pfEm = document.getElementById('pf-em');
  if (pfNm) pfNm.textContent = nf;
  if (pfEm) pfEm.textContent = novoEmail;
  /* Atualiza nome na sidebar */
  const sideName = document.querySelector('.user-chip .user-name');
  if (sideName) sideName.textContent = nf;
  /* Atualiza iniciais apenas se não tiver foto; preserva a foto se houver */
  if (!_currentAvatarUrl) _setAllAvatars(av);

  btn.disabled=false; btn.textContent='Salvar alterações';
  status.className='perfil-status ok';
  status.textContent = emailChanged
    ? '✓ Salvo! Confirme o novo e-mail na sua caixa de entrada.'
    : '✓ Perfil atualizado com sucesso!';
  setTimeout(()=>{ status.textContent=''; status.className='perfil-status'; }, 5000);
}

async function salvarApostila() {

let _aulasCache = [];

function escapeHtml(s='') {
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

/* Extrai o videoId de uma URL do YouTube (watch?v=, youtu.be, embed, shorts). */
function youtubeId(url) {
  if (!url || typeof url !== 'string') return null;
  const re = /(?:youtube\.com\/(?:watch\?(?:.*&)?v=|embed\/|shorts\/|v\/)|youtu\.be\/)([A-Za-z0-9_-]{11})/i;
  const m = url.match(re);
  return m ? m[1] : null;
}

function isYouTube(url) { return !!youtubeId(url); }

function parseQualidades(raw) {
  // Aceita: array JSON [{label,url}] OU string "label|url" por linha
  if (!raw) return [];
  if (Array.isArray(raw)) return raw.filter(q => q && q.url);
  if (typeof raw === 'string') {
    return raw.split('\n').map(l => l.trim()).filter(Boolean).map(line => {
      const [label, ...rest] = line.split('|');
      const url = rest.join('|').trim();
      return url ? { label: (label||'').trim() || 'auto', url } : null;
    }).filter(Boolean);
  }
  return [];
}

function qualidadesToText(arr) {
  if (!Array.isArray(arr)) return '';
  return arr.map(q => `${q.label||'auto'}|${q.url}`).join('\n');
}

function renderAulas(data, isAdmin) {
  _aulasCache = data;

    return;

    const disp = !!a.disponivel;
    const hasVideo = !!(a.video_url || (Array.isArray(a.qualidades) && a.qualidades.length));
    const clickable = disp && hasVideo;
    const thumbHtml = a.thumb_url
      ? `<img src="${escapeHtml(a.thumb_url)}" alt="">`
      : `<span style="font-size:42px">🎬</span>`;
    return `
      <div class="aula-card" id="aulacard-${a.id}">
        <div class="aula-thumb ${clickable?'':'locked'}" ${clickable?`onclick="abrirAula(${a.id})"`:''}>
          ${thumbHtml}
          <div class="play-icon">${disp?'▶':'🔒'}</div>
        </div>
        <div>
          <div class="aula-title">${escapeHtml(a.titulo||'')}</div>
        </div>
        ${a.descricao ? `<div class="aula-desc">${escapeHtml(a.descricao)}</div>` : ''}
        <span class="apostila-badge ${disp?'badge-open':'badge-locked'}" style="margin-top:auto">
          ${disp?'🔓 Disponível':'🔒 Em breve'}
        </span>
        ${isAdmin ? `

          <button class="btn-ap-adm" onclick="toggleDisponivelAula(${a.id},${disp})" title="${disp?'Desativar':'Ativar'}">
            ${disp?'🔒':'🔓'} ${disp?'Desativar':'Ativar'}

          <button class="btn-ap-adm" onclick="abrirModalAula(${a.id})" title="Editar">✏️ Editar</button>
          <button class="btn-ap-adm danger" onclick="deletarAula(${a.id})" title="Excluir">🗑️</button>
        </div>` : ''}
      </div>`;
  }).join('');
}

function abrirModalAula(id = null) {
  _editingAulaId = id;

      document.getElementById('a-thumb').value       = a.thumb_url || '';
      document.getElementById('a-disponivel').checked = !!a.disponivel;
    }
  } else {
    document.getElementById('a-num').value         = '';
    document.getElementById('a-titulo').value      = '';
    document.getElementById('a-descricao').value   = '';
    document.getElementById('a-video-url').value   = '';
    document.getElementById('a-qualidades').value  = '';

  }
  /* Reseta o input de arquivo */

    st.style.color = '';
  }

/* Upload de vídeo do computador → Supabase Storage → preenche URL */
async function handleAulaFileUpload(ev) {
  const file = ev.target.files?.[0];
  if (!file) return;
  const status   = document.getElementById('a-upload-status');
  const urlInput = document.getElementById('a-video-url');
  const saveBtn  = document.getElementById('btn-aula-save');

  /* Limite imposto pelo servidor Supabase no plano Free */
  if (file.size > 50 * 1024 * 1024) {
    status.style.color = '#dc2626';
    status.textContent = `Arquivo de ${(file.size/1024/1024).toFixed(1)} MB excede 50 MB. Comprima o vídeo ou hospede no YouTube e cole a URL.`;
    ev.target.value = '';
    return;
  }

  /* Sanitiza nome (sem acentos/espaços/símbolos) */
  const safeName = file.name
    .normalize('NFD').replace(/[̀-ͯ]/g,'')
    .replace(/[^A-Za-z0-9._-]/g,'_')
    .replace(/_+/g,'_');
  const path = `uploads/${Date.now()}-${safeName}`;

  status.style.color = '';
  status.textContent = `Enviando ${(file.size/1024/1024).toFixed(1)} MB…`;
  saveBtn && (saveBtn.disabled = true);

  const { error } = await sb.storage.from('aulas-videos').upload(path, file, {
    upsert: false,
    contentType: file.type || 'video/mp4',
    cacheControl: '3600',
  });
  saveBtn && (saveBtn.disabled = false);

  if (error) {
    status.style.color = '#dc2626';
    status.textContent = 'Erro no upload: ' + error.message;
    return;
  }

  const { data: { publicUrl } } = sb.storage.from('aulas-videos').getPublicUrl(path);
  urlInput.value = publicUrl;
  status.style.color = 'var(--green)';
  status.textContent = '✓ Vídeo enviado! URL preenchida abaixo. Clique em Salvar.';
}

async function salvarAula() {
  const btn = document.getElementById('btn-aula-save');
  btn.disabled = true; btn.textContent = 'Salvando…';

  const qualidades = parseQualidades(document.getElementById('a-qualidades').value);
  const payload = {
    num:        document.getElementById('a-num').value.trim() || null,
    titulo:     document.getElementById('a-titulo').value.trim(),
    descricao:  document.getElementById('a-descricao').value.trim() || null,
    video_url:  document.getElementById('a-video-url').value.trim() || null,
    qualidades: qualidades,
    thumb_url:  document.getElementById('a-thumb').value.trim() || null,
    disponivel: document.getElementById('a-disponivel').checked,
  };

  if (!payload.titulo) {
    alert('Título é obrigatório.');
    btn.disabled = false; btn.textContent = 'Salvar'; return;
  }
  if (!payload.video_url && qualidades.length === 0) {
    alert('Informe a URL do vídeo ou pelo menos uma qualidade.');
    btn.disabled = false; btn.textContent = 'Salvar'; return;
  }

  let error;
  if (_editingAulaId) {
    ({ error } = await sb.from('aulas').update(payload).eq('id', _editingAulaId));
  } else {
    const maxOrdem = _aulasCache.length ? Math.max(..._aulasCache.map(a => a.ordem || 0)) : 0;
    ({ error } = await sb.from('aulas').insert({ ...payload, ordem: maxOrdem + 1 }));
  }
  btn.disabled = false; btn.textContent = 'Salvar';
  if (error) { alert('Erro: ' + error.message); return; }
  fecharModalAula();
  await recarregarAulas();
}

async function deletarAula(id) {

  const { error } = await sb.from('aulas').delete().eq('id', id);

const SPEED_OPTIONS = [0.5, 0.75, 1, 1.25, 1.5, 1.75, 2];
let _currentAula = null;
let _currentQuality = null; // label
let _currentSpeed = 1;

function abrirAula(id) {
  const a = _aulasCache.find(x => x.id === id);
  if (!a) return;
  _currentAula = a;

  document.getElementById('video-num').textContent       = a.num || 'AULA';
  document.getElementById('video-title-lbl').textContent = a.titulo || '';
  document.getElementById('video-desc-box').textContent  = a.descricao || '';
  document.getElementById('video-desc-box').style.display = a.descricao ? '' : 'none';

  const video       = document.getElementById('video-frame');
  const yt          = document.getElementById('yt-frame');
  const speedWrap   = document.getElementById('speed-wrap');
  const qualityWrap = document.getElementById('quality-wrap');
  const hint        = document.getElementById('video-hint');

  /* Monta a lista de fontes (qualidades extras + video_url) */
  const extras = Array.isArray(a.qualidades) ? a.qualidades.filter(q => q && q.url) : [];
  let qualities = [...extras];
  if (a.video_url && !qualities.some(q => q.url === a.video_url)) {
    qualities.unshift({ label: 'auto', url: a.video_url });
  }
  if (!qualities.length && a.video_url) qualities = [{ label: 'auto', url: a.video_url }];

  const first = qualities[0];
  const ytId  = first ? youtubeId(first.url) : null;

  document.getElementById('video-overlay').classList.add('open');
  document.body.style.overflow = 'hidden';

  /* ── Caso 1: YouTube → renderiza iframe e esconde controles custom ── */
  if (ytId) {
    video.pause?.(); video.removeAttribute('src'); video.load?.();
    video.style.display = 'none';
    yt.style.display = '';
    /* autoplay=1, rel=0 (sem vídeos relacionados de outros canais),
       modestbranding=1, playsinline=1 */
    yt.src = `https://www.youtube.com/embed/${ytId}?autoplay=1&rel=0&modestbranding=1&playsinline=1`;
    /* YouTube embed tem seu próprio menu de velocidade e qualidade. */
    if (speedWrap)   speedWrap.style.display   = 'none';
    if (qualityWrap) qualityWrap.style.display = 'none';
    if (hint) hint.textContent = 'Use os controles do YouTube para velocidade e qualidade.';
    return;
  }

  /* ── Caso 2: Vídeo direto (MP4/WEBM) ── */
  yt.src = ''; yt.style.display = 'none';
  video.style.display = '';
  if (hint) hint.textContent = 'Use ESPAÇO para play/pause · ←/→ para avançar';

  /* Render menu de qualidades */
  const qualityMenu = document.getElementById('quality-menu');
  if (qualities.length > 1) {
    qualityWrap.style.display = '';
    qualityMenu.innerHTML = qualities.map((q, i) => `
      <div class="vctrl-menu-item ${i===0?'active':''}" data-quality-url="${escapeHtml(q.url)}" data-quality-label="${escapeHtml(q.label)}">
        <span>${escapeHtml(q.label)}</span><span class="check">✓</span>
      </div>
    `).join('');
    qualityMenu.querySelectorAll('.vctrl-menu-item').forEach(el => {
      el.addEventListener('click', () => setQuality(el.dataset.qualityUrl, el.dataset.qualityLabel));
    });
  } else {
    qualityWrap.style.display = 'none';
  }

  /* Render menu de velocidades */
  if (speedWrap) speedWrap.style.display = '';
  const speedMenu = document.getElementById('speed-menu');
  speedMenu.innerHTML = SPEED_OPTIONS.map(s => `
    <div class="vctrl-menu-item ${s===1?'active':''}" data-speed="${s}">
      <span>${s}x${s===1?' (normal)':''}</span><span class="check">✓</span>
    </div>
  `).join('');
  speedMenu.querySelectorAll('.vctrl-menu-item').forEach(el => {
    el.addEventListener('click', () => setPlaybackRate(parseFloat(el.dataset.speed)));
  });

  /* Carrega vídeo na primeira qualidade */
  if (first) {
    _currentQuality = first.label;
    document.getElementById('quality-label').textContent = `Qualidade: ${first.label}`;
    video.src = first.url;
  }
  _currentSpeed = 1;
  video.playbackRate = 1;
  document.getElementById('speed-label').textContent = 'Velocidade: 1x';
  video.play().catch(()=>{ /* autoplay bloqueado → ok, usuário clica */ });
}

function fecharAula() {
  const ov = document.getElementById('video-overlay');
  if (!ov || !ov.classList.contains('open')) return;
  ov.classList.remove('open');
  const v = document.getElementById('video-frame');
  if (v) { v.pause(); v.removeAttribute('src'); v.load(); }
  const yt = document.getElementById('yt-frame');
  if (yt) { yt.src = ''; yt.style.display = 'none'; }
  document.body.style.overflow = '';
  closeAllVctrlMenus();
  _currentAula = null;
}

function setPlaybackRate(rate) {
  const v = document.getElementById('video-frame');
  if (!v) return;
  v.playbackRate = rate;
  _currentSpeed = rate;
  document.getElementById('speed-label').textContent = `Velocidade: ${rate}x`;
  document.querySelectorAll('#speed-menu .vctrl-menu-item').forEach(el => {
    el.classList.toggle('active', parseFloat(el.dataset.speed) === rate);
  });
  closeAllVctrlMenus();
}

function setQuality(url, label) {
  const v = document.getElementById('video-frame');
  if (!v) return;
  const wasPlaying = !v.paused;
  const time = v.currentTime;
  v.src = url;
  v.addEventListener('loadedmetadata', function once() {
    v.currentTime = time;
    v.playbackRate = _currentSpeed;
    if (wasPlaying) v.play().catch(()=>{});
    v.removeEventListener('loadedmetadata', once);
  });
  _currentQuality = label;
  document.getElementById('quality-label').textContent = `Qualidade: ${label}`;
  document.querySelectorAll('#quality-menu .vctrl-menu-item').forEach(el => {
    el.classList.toggle('active', el.dataset.qualityUrl === url);
  });
  closeAllVctrlMenus();
}

function toggleVctrlMenu(which) {
  const menu = document.getElementById(which === 'speed' ? 'speed-menu' : 'quality-menu');
  const other = document.getElementById(which === 'speed' ? 'quality-menu' : 'speed-menu');
  if (other) other.classList.remove('open');
  if (menu) menu.classList.toggle('open');
}
function closeAllVctrlMenus() {
  document.querySelectorAll('.vctrl-menu').forEach(m => m.classList.remove('open'));
}
/* Fecha os menus ao clicar fora */
document.addEventListener('click', (e) => {
  if (!e.target.closest('.vctrl')) closeAllVctrlMenus();
});
/* Atalhos de teclado dentro do player */
document.addEventListener('keydown', (e) => {
  const ov = document.getElementById('video-overlay');
  if (!ov || !ov.classList.contains('open')) return;
  const v = document.getElementById('video-frame');
  if (!v) return;
  // Não interferir se o foco estiver em algum input
  const tag = (document.activeElement?.tagName || '').toLowerCase();
  if (tag === 'input' || tag === 'textarea') return;
  if (e.key === ' ') { e.preventDefault(); v.paused ? v.play() : v.pause(); }
  else if (e.key === 'ArrowRight') { v.currentTime = Math.min(v.duration||1e9, v.currentTime + 5); }
  else if (e.key === 'ArrowLeft')  { v.currentTime = Math.max(0, v.currentTime - 5); }
});

async function resetSenha(userId, email, nome) {
  if (!userId) { alert('ID de usuário não disponível.'); return; }

  /* Gera a senha padrão: 2 iniciais do e-mail em maiúsculo + "edit2026" */
  const prefix   = (email || '').split('@')[0].slice(0, 2).toUpperCase();
  const novaSenha = prefix + 'edit2026';

  const confirmMsg =
    `Redefinir senha de ${nome || email}?\n\n` +
    `Nova senha padrão: ${novaSenha}\n\n` +
    `Anote esta senha para repassar ao usuário após confirmar.`;

  if (!confirm(confirmMsg)) return;

  const { error } = await sb.rpc('admin_reset_password', {
    p_user_id:    userId,
    p_new_password: novaSenha
  });

  if (error) { alert('Erro ao redefinir senha: ' + error.message); return; }

  alert(
    `✓ Senha redefinida com sucesso!\n\n` +
    `Usuário: ${nome || email}\n` +
    `Nova senha: ${novaSenha}\n\n` +
    `Repasse esta senha ao usuário.`
  );
}
